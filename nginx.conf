server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Astro genera directory con index.html — prova prima il file esatto,
    # poi la directory, poi slug.html, infine 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache lunga per CSS/JS (hanno hash nel nome)
    location ~* \.(css|js|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Redirect /feed/ → /feed (il file non ha estensione, non è una directory)
    location = /feed/ {
        return 301 /feed;
    }

    # Nessuna cache per sitemap e feed
    location ~* \.(xml)$ {
        expires 0;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    error_page 404 /404.html;
}
